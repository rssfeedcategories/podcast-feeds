name: Update Podcast Feeds

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes - incremental
    - cron: '0 3 * * *'      # Every day at 3am UTC - full rebuild
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run incremental update (every 15 min)
        if: github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *'
        run: python generate_category_feeds.py --incremental

      - name: Run full rebuild (daily 3am)
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
        run: python generate_category_feeds.py --full

      - name: Run manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            python generate_category_feeds.py --full
          else
            python generate_category_feeds.py --incremental
          fi

      - name: Commit and push ONLY if feeds changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output_feeds/ checkpoint.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            git commit -m "Feed update - $CHANGED file(s) $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed!"
          fi

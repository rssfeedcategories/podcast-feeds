name: Update Podcast Feeds

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes - incremental
    - cron: '0 3 * * 0'      # Every Sunday 3am UTC - full rebuild
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - incremental
          - full

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run feed generator (scheduled)
        if: github.event_name == 'schedule'
        run: |
          DAY=$(date -u +%u)
          HOUR=$(date -u +%H)
          if [ "$DAY" = "7" ] && [ "$HOUR" = "03" ]; then
            echo "Weekly full rebuild..."
            python generate_category_feeds.py --full
          else
            echo "Incremental update..."
            python generate_category_feeds.py --incremental
          fi

      - name: Run feed generator (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "full" ]; then
            python generate_category_feeds.py --full
          elif [ "$MODE" = "incremental" ]; then
            python generate_category_feeds.py --incremental
          else
            python generate_category_feeds.py
          fi

      - name: Commit and push ONLY if feeds changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output_feeds/ checkpoint.json
          if git diff --staged --quiet; then
            echo "No changes detected — skipping commit."
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            git commit -m "New episodes detected - updated $CHANGED file(s) $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed updates!"
          fi
